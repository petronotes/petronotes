<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="'Satoshi', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0ea"/>
      <stop offset="100%" stop-color="#ede7dd"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a6b6e"/>
      <stop offset="100%" stop-color="#247578"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1a6b6e"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#c4783e"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#a0522d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="420" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-size="16" font-weight="600" fill="#2c2c2c">Взаимодействие нейтронов с веществом</text>

  <!-- Source box -->
  <rect x="30" y="160" width="130" height="80" rx="8" fill="url(#teal)"/>
  <text x="95" y="195" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Источник</text>
  <text x="95" y="215" text-anchor="middle" font-size="11" fill="#c8e6e7">нейтронов</text>

  <!-- Fast neutron going right -->
  <line x1="160" y1="200" x2="240" y2="200" stroke="#1a6b6e" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="200" y="190" text-anchor="middle" font-size="10" fill="#1a6b6e" font-weight="500">быстрый n</text>

  <!-- Rock nucleus -->
  <circle cx="290" cy="200" r="40" fill="#d4c5a9" stroke="#a89a7a" stroke-width="2"/>
  <text x="290" y="196" text-anchor="middle" font-size="12" font-weight="600" fill="#5a4e3a">Ядро</text>
  <text x="290" y="212" text-anchor="middle" font-size="10" fill="#6b5f4d">породы</text>

  <!-- Branch 1: Elastic scattering (top) -->
  <line x1="320" y1="170" x2="420" y2="100" stroke="#1a6b6e" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <rect x="430" y="70" width="165" height="55" rx="8" fill="#fff" stroke="#1a6b6e" stroke-width="1.5"/>
  <text x="512" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#1a6b6e">Упругое рассеяние</text>
  <text x="512" y="108" text-anchor="middle" font-size="10" fill="#666">замедление нейтрона</text>

  <!-- Branch 2: Inelastic scattering (middle-top) -->
  <line x1="330" y1="195" x2="420" y2="185" stroke="#c4783e" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <rect x="430" y="157" width="165" height="55" rx="8" fill="#fff" stroke="#c4783e" stroke-width="1.5"/>
  <text x="512" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#c4783e">Неупругое рассеяние</text>
  <text x="512" y="194" text-anchor="middle" font-size="10" fill="#666">n + γ-квант</text>

  <!-- Branch 3: Capture (middle-bottom) -->
  <line x1="320" y1="230" x2="420" y2="275" stroke="#a0522d" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <rect x="430" y="248" width="165" height="55" rx="8" fill="#fff" stroke="#a0522d" stroke-width="1.5"/>
  <text x="512" y="269" text-anchor="middle" font-size="12" font-weight="600" fill="#a0522d">Радиационный захват</text>
  <text x="512" y="285" text-anchor="middle" font-size="10" fill="#666">поглощение + γ</text>

  <!-- Branch 4: Fission (bottom) -->
  <line x1="310" y1="238" x2="420" y2="355" stroke="#7b3f5e" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <rect x="430" y="332" width="165" height="55" rx="8" fill="#fff" stroke="#7b3f5e" stroke-width="1.5"/>
  <text x="512" y="353" text-anchor="middle" font-size="12" font-weight="600" fill="#7b3f5e">Деление ядра</text>
  <text x="512" y="369" text-anchor="middle" font-size="10" fill="#666">U-235, Pu-239</text>

  <!-- Labels for groups -->
  <rect x="635" y="75" width="10" height="10" rx="2" fill="#1a6b6e" opacity="0.7"/>
  <text x="650" y="85" font-size="9" fill="#666">без поглощения</text>

  <rect x="635" y="265" width="10" height="10" rx="2" fill="#a0522d" opacity="0.7"/>
  <text x="650" y="275" font-size="9" fill="#666">с поглощением</text>
</svg>