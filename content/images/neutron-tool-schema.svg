<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" font-family="'Satoshi', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0ea"/>
      <stop offset="100%" stop-color="#ede7dd"/>
    </linearGradient>
    <linearGradient id="borehole" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a7e6a"/>
      <stop offset="100%" stop-color="#a89a7a"/>
    </linearGradient>
    <linearGradient id="tool" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>
    <radialGradient id="neutronGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a6b6e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a6b6e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="500" rx="12" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-size="16" font-weight="600" fill="#2c2c2c">Схема нейтронного каротажа (ННКт / ННКнт)</text>

  <!-- Formation (rock) -->
  <rect x="40" y="55" width="230" height="430" rx="4" fill="#d4c5a9" stroke="#a89a7a" stroke-width="1.5"/>
  <text x="155" y="80" text-anchor="middle" font-size="12" font-weight="500" fill="#6b5f4d">Горная порода</text>

  <!-- Borehole -->
  <rect x="270" y="55" width="80" height="430" rx="0" fill="#9bb8c4" opacity="0.4" stroke="#7a9aa8" stroke-width="1"/>
  <text x="310" y="80" text-anchor="middle" font-size="10" fill="#5a7a88">Скважина</text>

  <!-- Formation right -->
  <rect x="350" y="55" width="110" height="430" rx="4" fill="#d4c5a9" stroke="#a89a7a" stroke-width="1.5"/>

  <!-- Neutron cloud visualization -->
  <circle cx="310" cy="240" r="130" fill="url(#neutronGlow)"/>

  <!-- Tool body -->
  <rect x="295" y="120" width="30" height="350" rx="6" fill="url(#tool)" stroke="#222" stroke-width="1"/>

  <!-- Source -->
  <rect x="289" y="320" width="42" height="36" rx="4" fill="#c4783e" stroke="#a0522d" stroke-width="1.5"/>
  <text x="310" y="342" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Источник</text>

  <!-- Near detector -->
  <rect x="289" y="240" width="42" height="30" rx="4" fill="#1a6b6e" stroke="#145456" stroke-width="1.5"/>
  <text x="310" y="259" text-anchor="middle" font-size="8" font-weight="600" fill="#fff">Бл. дет.</text>

  <!-- Far detector -->
  <rect x="289" y="170" width="42" height="30" rx="4" fill="#1a6b6e" stroke="#145456" stroke-width="1.5"/>
  <text x="310" y="189" text-anchor="middle" font-size="8" font-weight="600" fill="#fff">Дал. дет.</text>

  <!-- Neutron paths (scattered) -->
  <path d="M310,320 Q230,280 290,248" fill="none" stroke="#1a6b6e" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <path d="M310,320 Q180,250 290,190" fill="none" stroke="#1a6b6e" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M310,320 Q390,270 330,248" fill="none" stroke="#1a6b6e" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <path d="M310,320 Q420,230 330,190" fill="none" stroke="#1a6b6e" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Small neutron dots along paths -->
  <circle cx="260" cy="285" r="3" fill="#1a6b6e" opacity="0.6"/>
  <circle cx="230" cy="265" r="2.5" fill="#1a6b6e" opacity="0.5"/>
  <circle cx="370" cy="275" r="3" fill="#1a6b6e" opacity="0.6"/>
  <circle cx="400" cy="250" r="2.5" fill="#1a6b6e" opacity="0.5"/>

  <!-- Hydrogen atoms in pores -->
  <circle cx="120" cy="200" r="8" fill="#e8d5b8" stroke="#c4a87a" stroke-width="1"/>
  <text x="120" y="204" text-anchor="middle" font-size="8" font-weight="700" fill="#8b6914">H</text>
  <circle cx="90" cy="300" r="8" fill="#e8d5b8" stroke="#c4a87a" stroke-width="1"/>
  <text x="90" y="304" text-anchor="middle" font-size="8" font-weight="700" fill="#8b6914">H</text>
  <circle cx="170" cy="350" r="8" fill="#e8d5b8" stroke="#c4a87a" stroke-width="1"/>
  <text x="170" y="354" text-anchor="middle" font-size="8" font-weight="700" fill="#8b6914">H</text>
  <circle cx="140" cy="260" r="8" fill="#e8d5b8" stroke="#c4a87a" stroke-width="1"/>
  <text x="140" y="264" text-anchor="middle" font-size="8" font-weight="700" fill="#8b6914">H</text>
  <circle cx="380" cy="250" r="8" fill="#e8d5b8" stroke="#c4a87a" stroke-width="1"/>
  <text x="380" y="254" text-anchor="middle" font-size="8" font-weight="700" fill="#8b6914">H</text>
  <circle cx="410" cy="320" r="8" fill="#e8d5b8" stroke="#c4a87a" stroke-width="1"/>
  <text x="410" y="324" text-anchor="middle" font-size="8" font-weight="700" fill="#8b6914">H</text>

  <!-- Annotations panel -->
  <rect x="490" y="100" width="210" height="310" rx="10" fill="#fff" fill-opacity="0.85" stroke="#d4c5a9" stroke-width="1"/>

  <!-- Source label -->
  <rect x="510" y="120" width="14" height="14" rx="3" fill="#c4783e"/>
  <text x="532" y="132" font-size="12" font-weight="600" fill="#333">Источник нейтронов</text>
  <text x="510" y="150" font-size="10" fill="#666">Am-Be или импульсный</text>
  <text x="510" y="164" font-size="10" fill="#666">генератор (14 МэВ)</text>

  <!-- Near det label -->
  <rect x="510" y="190" width="14" height="14" rx="3" fill="#1a6b6e"/>
  <text x="532" y="202" font-size="12" font-weight="600" fill="#333">Ближний детектор</text>
  <text x="510" y="220" font-size="10" fill="#666">~30 см от источника</text>

  <!-- Far det label -->
  <rect x="510" y="246" width="14" height="14" rx="3" fill="#1a6b6e" opacity="0.65"/>
  <text x="532" y="258" font-size="12" font-weight="600" fill="#333">Дальний детектор</text>
  <text x="510" y="276" font-size="10" fill="#666">~50 см от источника</text>

  <!-- Hydrogen label -->
  <circle cx="517" cy="310" r="8" fill="#e8d5b8" stroke="#c4a87a" stroke-width="1"/>
  <text x="517" y="314" text-anchor="middle" font-size="8" font-weight="700" fill="#8b6914">H</text>
  <text x="532" y="314" font-size="12" font-weight="600" fill="#333">Водород в порах</text>
  <text x="510" y="332" font-size="10" fill="#666">Замедляет нейтроны,</text>
  <text x="510" y="346" font-size="10" fill="#666">определяет пористость</text>

  <!-- Dashed lines -->
  <line x1="510" y1="180" x2="680" y2="180" stroke="#d4c5a9" stroke-width="0.5"/>
  <line x1="510" y1="236" x2="680" y2="236" stroke="#d4c5a9" stroke-width="0.5"/>
  <line x1="510" y1="296" x2="680" y2="296" stroke="#d4c5a9" stroke-width="0.5"/>

  <!-- Formula -->
  <text x="510" y="385" font-size="11" font-weight="500" fill="#1a6b6e">Пористость ≈ f(N_бл / N_дал)</text>
</svg>